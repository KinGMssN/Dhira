<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thoughts — Dhira</title>
  <link rel="icon" href="logo.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav>
    <a class="nav-logo" href="index.html">Dhira <span>धीरा</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="personal.html">Personal</a></li>
      <li><a href="thoughts.html" class="active">Thoughts</a></li>
      <li><a href="book.html">The Book</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <div id="list-view">
    <div class="subpage-container">
      <p class="page-eyebrow">Notebook & Log</p>
      <h1>Random <em>thoughts.</em></h1>
      <p class="subpage-intro">Unfinished ideas, sudden questions, and things that arrive without invitation. No neat conclusions — just the thinking itself.</p>
    </div>
    <div class="thoughts-feed" id="thoughts-feed"></div>
    <footer><div class="footer-logo">Dhira</div><div class="footer-devanagari">धीरा</div></footer>
  </div>

  <div id="reader-view" style="display:none;">
    <div class="blog-reader">
      <a class="blog-reader-back" onclick="showList()">← Back to thoughts</a>
      <h1 id="reader-title"></h1>
      <div class="blog-reader-meta" id="reader-meta"></div>
      <div class="blog-reader-body" id="reader-body"></div>
    </div>
    <footer><div class="footer-logo">Dhira</div><div class="footer-devanagari">धीरा</div></footer>
  </div>

  <script src="config.js"></script>
  <script>
    let _blogs = [];

    function fmt(iso) {
      return new Date(iso).toLocaleDateString('en-IN', { year:'numeric', month:'long', day:'numeric' });
    }

    async function renderFeed() {
      const feed = document.getElementById('thoughts-feed');
      feed.innerHTML = '<div class="empty-state"><p>Loading…</p></div>';
      try {
        const res = await fetch(`${DHIRA_CONFIG.API_BASE}/posts?category=thoughts`);
        if (!res.ok) throw new Error('Server error');
        _blogs = await res.json();
        if (!_blogs.length) {
          feed.innerHTML = '<div class="empty-state"><p>No thoughts posted yet. Check back soon.</p></div>';
          return;
        }
        feed.innerHTML = _blogs.map(b => `
          <div class="thought-card" onclick="openBlog('${b.id}')" style="cursor:pointer;">
            <div class="thought-date">${fmt(b.date)}${b.tag ? ` · ${b.tag}` : ''}</div>
            <div class="thought-content">
              <strong style="font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:500;display:block;margin-bottom:0.5rem;">${b.title}</strong>
              ${b.excerpt || b.body.substring(0,200).replace(/\n/g,' ')+'…'}
            </div>
            <div style="margin-top:1rem;font-size:0.72rem;color:var(--sage);letter-spacing:0.1em;text-transform:uppercase;">Read more →</div>
          </div>`).join('');
      } catch {
        feed.innerHTML = '<div class="empty-state"><p>Could not load thoughts. Please try again later.</p></div>';
      }
    }

    function openBlog(id) {
      const b = _blogs.find(x => x.id === id);
      if (!b) return;
      document.getElementById('reader-title').textContent = b.title;
      document.getElementById('reader-meta').innerHTML =
        `<span>${fmt(b.date)}</span>${b.tag ? `<span class="essay-tag">${b.tag}</span>` : ''}`;
      document.getElementById('reader-body').innerHTML =
        b.body.split('\n\n').map(p => `<p>${p}</p>`).join('');
      document.getElementById('list-view').style.display = 'none';
      document.getElementById('reader-view').style.display = 'block';
      window.scrollTo(0,0);
    }

    function showList() {
      document.getElementById('reader-view').style.display = 'none';
      document.getElementById('list-view').style.display = 'block';
      window.scrollTo(0,0);
    }

    renderFeed();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Book — Dhira</title>
  <link rel="icon" href="logo.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav>
    <a class="nav-logo" href="index.html">Dhira <span>धीरा</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="personal.html">Personal</a></li>
      <li><a href="thoughts.html">Thoughts</a></li>
      <li><a href="book.html" class="active">The Book</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <div id="list-view">
    <div class="subpage-container">
      <p class="page-eyebrow">Work in Progress</p>
      <h1>The <em>Book.</em></h1>
      <p class="subpage-intro">Notes from inside a work in progress — the writing, the doubt, the discoveries, and everything that happens in between.</p>
    </div>
    <div class="book-container">
      <div id="book-posts"></div>
    </div>
    <footer><div class="footer-logo">Dhira</div><div class="footer-devanagari">धीरा</div></footer>
  </div>

  <div id="reader-view" style="display:none;">
    <div class="blog-reader">
      <a class="blog-reader-back" onclick="showList()">← Back to The Book</a>
      <h1 id="reader-title"></h1>
      <div class="blog-reader-meta" id="reader-meta"></div>
      <div class="blog-reader-body" id="reader-body"></div>
    </div>
    <footer><div class="footer-logo">Dhira</div><div class="footer-devanagari">धीरा</div></footer>
  </div>

  <script src="config.js"></script>
  <script>
    let _blogs = [];

    function fmt(iso) {
      return new Date(iso).toLocaleDateString('en-IN', { year:'numeric', month:'long', day:'numeric' });
    }

    async function renderPosts() {
      const container = document.getElementById('book-posts');
      container.innerHTML = '<div class="empty-state"><p>Loading…</p></div>';
      try {
        const res = await fetch(`${DHIRA_CONFIG.API_BASE}/posts?category=book`);
        if (!res.ok) throw new Error('Server error');
        _blogs = await res.json();
        if (!_blogs.length) {
          container.innerHTML = '<div class="empty-state"><p>No book updates yet. The writing continues quietly.</p></div>';
          return;
        }
        container.innerHTML = `
          <h2 style="font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:400;color:var(--charcoal);margin-bottom:2rem;">Updates from the desk</h2>
          <div style="display:flex;flex-direction:column;gap:2.5rem;">
            ${_blogs.map(b => `
              <div class="essay-item">
                <div class="essay-meta">
                  <span>${fmt(b.date)}</span>
                  ${b.tag ? `<span class="essay-tag">${b.tag}</span>` : ''}
                </div>
                <div class="essay-title" onclick="openBlog('${b.id}')">${b.title}</div>
                <p class="essay-excerpt">${b.excerpt || b.body.substring(0,160).replace(/\n/g,' ')+'…'}</p>
                <span class="essay-link" onclick="openBlog('${b.id}')">Read update →</span>
              </div>`).join('')}
          </div>`;
      } catch {
        container.innerHTML = '<div class="empty-state"><p>Could not load updates. Please try again later.</p></div>';
      }
    }

    function openBlog(id) {
      const b = _blogs.find(x => x.id === id);
      if (!b) return;
      document.getElementById('reader-title').textContent = b.title;
      document.getElementById('reader-meta').innerHTML =
        `<span>${fmt(b.date)}</span>${b.tag ? `<span class="essay-tag">${b.tag}</span>` : ''}`;
      document.getElementById('reader-body').innerHTML =
        b.body.split('\n\n').map(p => `<p>${p}</p>`).join('');
      document.getElementById('list-view').style.display = 'none';
      document.getElementById('reader-view').style.display = 'block';
      window.scrollTo(0,0);
    }

    function showList() {
      document.getElementById('reader-view').style.display = 'none';
      document.getElementById('list-view').style.display = 'block';
      window.scrollTo(0,0);
    }

    renderPosts();
  </script>
</body>
</html>
